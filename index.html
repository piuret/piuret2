<div id="app" style="font-family: system-ui, sans-serif; max-width: 920px; margin: 0 auto; padding: 16px; color:#1a1a1a;">
  <h2 style="margin-bottom:4px;">심슨의 역설 시뮬레이터</h2>
  <p style="color:#555; font-size:14px; margin-top:0;">버튼을 누르면 브라우저에서 직접 무작위 시행을 실행합니다. 코드는 아래 각 단계 설명과 함께 실행 로그로 출력됩니다.</p>

  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:12px 0;">
    <label>시행 횟수:
      <input id="nTrials" type="number" value="100000" min="1000" max="1000000" step="1000" style="width:100px; padding:4px;">
    </label>
    <button id="runBtn" style="padding:8px 16px; background:#4C72B0; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600;">시뮬레이션 실행</button>
    <span id="status" style="font-size:13px; color:#777;"></span>
  </div>

  <div id="stats" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; margin-bottom:16px;"></div>

  <h3>1. α–β 평면에서 역전 발생 지점 (표본 5,000개)</h3>
  <canvas id="scatter" width="480" height="480" style="border:1px solid #ddd; max-width:100%;"></canvas>

  <h3>2. 역전 발생 빈도</h3>
  <canvas id="bar" width="480" height="320" style="border:1px solid #ddd; max-width:100%;"></canvas>

  <h3>3. AI 분류 정확도 역전 영역 (p1=0.9, p2=0.4, q1=0.8, q2=0.3 고정)</h3>
  <canvas id="heatmap" width="480" height="480" style="border:1px solid #ddd; max-width:100%;"></canvas>

  <pre id="log" style="background:#f5f5f5; padding:10px; font-size:12px; white-space:pre-wrap; border-radius:6px; margin-top:16px;"></pre>
</div>

<script>
const logEl = document.getElementById('log');
function log(msg){ logEl.textContent += msg + "\n"; }

function rand(){ return Math.random(); }

function runSimulation(N){
  logEl.textContent = "";
  document.getElementById('status').textContent = "실행 중...";

  // ---- 1단계: 조건 만족하는 (p1,p2,q1,q2) 생성 ----
  const p1=[], p2=[], q1=[], q2=[];
  let attempts = 0;
  while(p1.length < N){
    attempts++;
    const a=rand(), b=rand(), c=rand(), d=rand();
    if(a>c && b>d && a>b && c>d){
      p1.push(a); p2.push(b); q1.push(c); q2.push(d);
    }
  }
  log(`[1단계] 조건 만족 4개조 획득: ${N}개 (시도 ${attempts}회, 채택률 ${(N/attempts*100).toFixed(3)}%)`);

  // ---- 2단계: 가중치 alpha, beta 생성, 전체 성공률 계산 ----
  const alpha = new Float64Array(N), beta = new Float64Array(N);
  const PSA = new Float64Array(N), PSB = new Float64Array(N);
  const reversal = new Uint8Array(N);
  let nRev = 0;
  for(let i=0;i<N;i++){
    alpha[i]=rand(); beta[i]=rand();
    PSA[i] = alpha[i]*p1[i] + (1-alpha[i])*p2[i];
    PSB[i] = beta[i]*q1[i] + (1-beta[i])*q2[i];
    // ---- 3단계: 역전 판정 ----
    const rev = PSA[i] < PSB[i];
    reversal[i] = rev ? 1 : 0;
    if(rev) nRev++;
  }
  const rate = nRev/N;
  log(`[3단계] 역전 발생: ${nRev.toLocaleString()}회 / ${N.toLocaleString()}회 (발생률 ${(rate*100).toFixed(3)}%)`);

  // ---- 4단계: 이론식 검증 (부등식: alpha*(p1-p2) - beta*(q1-q2) < q2-p2) ----
  let matchCount = 0;
  for(let i=0;i<N;i++){
    const lhs = alpha[i]*(p1[i]-p2[i]) - beta[i]*(q1[i]-q2[i]);
    const rhs = q2[i]-p2[i];
    const revTheory = lhs < rhs;
    if((revTheory?1:0) === reversal[i]) matchCount++;
  }
  const matchRate = matchCount/N;
  log(`[4단계] 이론식-시뮬레이션 판정 일치율: ${(matchRate*100).toFixed(4)}%`);

  document.getElementById('stats').innerHTML = `
    <div style="background:#eef2f8;padding:10px;border-radius:6px;"><b>${N.toLocaleString()}</b><br><span style="font-size:12px;color:#666;">총 시행</span></div>
    <div style="background:#fbeaea;padding:10px;border-radius:6px;"><b>${nRev.toLocaleString()}</b><br><span style="font-size:12px;color:#666;">역전 발생 횟수</span></div>
    <div style="background:#fbeaea;padding:10px;border-radius:6px;"><b>${(rate*100).toFixed(3)}%</b><br><span style="font-size:12px;color:#666;">역전 발생률</span></div>
    <div style="background:#e8f5e9;padding:10px;border-radius:6px;"><b>${(matchRate*100).toFixed(4)}%</b><br><span style="font-size:12px;color:#666;">이론식 일치율</span></div>
  `;

  drawScatter(alpha, beta, reversal, N);
  drawBar(N, nRev);
  drawHeatmap();
  document.getElementById('status').textContent = "완료";
}

function drawScatter(alpha, beta, reversal, N){
  const c = document.getElementById('scatter'), ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const pad=40, W=c.width-pad*1.5, H=c.height-pad*1.5;
  ctx.strokeStyle="#333"; ctx.beginPath();
  ctx.moveTo(pad,pad); ctx.lineTo(pad,pad+H); ctx.lineTo(pad+W,pad+H); ctx.stroke();
  ctx.font="12px sans-serif"; ctx.fillStyle="#333";
  ctx.fillText("α", pad+W/2, pad+H+22);
  ctx.save(); ctx.translate(12,pad+H/2); ctx.rotate(-Math.PI/2); ctx.fillText("β",0,0); ctx.restore();

  const sampleSize = Math.min(5000, N);
  const step = Math.max(1, Math.floor(N/sampleSize));
  for(let i=0;i<N;i+=step){
    const x = pad + alpha[i]*W;
    const y = pad + (1-beta[i])*H;
    ctx.fillStyle = reversal[i] ? "rgba(196,78,82,0.7)" : "rgba(76,114,176,0.35)";
    ctx.beginPath(); ctx.arc(x,y,2,0,7); ctx.fill();
  }
  ctx.fillStyle="#C44E52"; ctx.fillText("● 역전 발생", pad+W-110, pad+14);
  ctx.fillStyle="#4C72B0"; ctx.fillText("● 역전 없음", pad+W-110, pad+30);
}

function drawBar(N, nRev){
  const c = document.getElementById('bar'), ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const pad=50, W=c.width-pad*1.5, H=c.height-pad*1.5;
  const vals=[N-nRev, nRev], labels=["역전 없음","역전 발생"], colors=["#4C72B0","#C44E52"];
  const maxV = N;
  const bw = W/3;
  vals.forEach((v,i)=>{
    const bh = (v/maxV)*H;
    const x = pad + i*W/2 + W/4 - bw/2;
    const y = pad + H - bh;
    ctx.fillStyle=colors[i];
    ctx.fillRect(x,y,bw,bh);
    ctx.fillStyle="#333"; ctx.font="12px sans-serif"; ctx.textAlign="center";
    ctx.fillText(`${v.toLocaleString()} (${(v/N*100).toFixed(2)}%)`, x+bw/2, y-8);
    ctx.fillText(labels[i], x+bw/2, pad+H+18);
  });
  ctx.textAlign="left";
  ctx.strokeStyle="#333"; ctx.beginPath();
  ctx.moveTo(pad,pad); ctx.lineTo(pad,pad+H); ctx.lineTo(pad+W,pad+H); ctx.stroke();
}

function drawHeatmap(){
  const c = document.getElementById('heatmap'), ctx = c.getContext('2d');
  const p1=0.9, p2=0.4, q1=0.8, q2=0.3;
  const pad=40, W=c.width-pad*1.5, H=c.height-pad*1.5;
  const res=100;
  for(let ix=0; ix<res; ix++){
    for(let iy=0; iy<res; iy++){
      const a = ix/(res-1), b = 1-(iy/(res-1));
      const PSA = a*p1+(1-a)*p2, PSB = b*q1+(1-b)*q2;
      const rev = PSA < PSB;
      ctx.fillStyle = rev ? "#8B2E3F" : "#2E5D8B";
      ctx.fillRect(pad + ix*W/res, pad + iy*H/res, W/res+1, H/res+1);
    }
  }
  // 이론적 경계선 beta = alpha + 0.2
  ctx.strokeStyle="#000"; ctx.setLineDash([6,4]); ctx.lineWidth=2;
  ctx.beginPath();
  const a0=0, b0=0.2, a1=0.8, b1=1.0;
  ctx.moveTo(pad+a0*W, pad+(1-b0)*H);
  ctx.lineTo(pad+a1*W, pad+(1-b1)*H);
  ctx.stroke(); ctx.setLineDash([]);

  ctx.strokeStyle="#333"; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(pad,pad); ctx.lineTo(pad,pad+H); ctx.lineTo(pad+W,pad+H); ctx.stroke();
  ctx.font="12px sans-serif"; ctx.fillStyle="#333";
  ctx.fillText("α (그룹1 가중치, A모델)", pad+W/2-70, pad+H+22);
  ctx.save(); ctx.translate(12,pad+H/2); ctx.rotate(-Math.PI/2); ctx.fillText("β (그룹1 가중치, B모델)",-70,0); ctx.restore();
  ctx.fillStyle="#000"; ctx.fillText("- - 이론 경계선: β = α + 0.2", pad+10, pad+16);
}

document.getElementById('runBtn').addEventListener('click', () => {
  const N = parseInt(document.getElementById('nTrials').value) || 100000;
  setTimeout(() => runSimulation(N), 10);
});

// 초기 1회 자동 실행
runSimulation(100000);
</script>
